<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand">
Credit Card Prediction
</a>

<div>

<a href="/dashboard" class="btn btn-light me-2">
Dashboard
</a>

<a href="/logout" class="btn btn-danger">
Logout
</a>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Enter Applicant Details</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Annual Income</label>

<input
type="number"
step="0.01"
name="income"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Family Members</label>

<input
type="number"
step="1"
name="family"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Children</label>

<input
type="number"
step="1"
name="children"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Age</label>

<input
type="number"
step="1"
name="age"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Employment Years</label>

<input
type="number"
step="1"
name="employment"
class="form-control"
required>

</div>

</div>

<div class="d-grid">

<button
class="btn btn-success">

Predict

</button>

</div>

</form>

{% if prediction %}

<hr>

<div class="alert alert-info text-center mt-4">

<h3>{{ prediction }}</h3>

</div>

{% endif %}

</div>

</div>

</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
