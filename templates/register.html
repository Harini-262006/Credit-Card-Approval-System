<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-lg">

<div class="card-header bg-success text-white text-center">

<h3>Create Account</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="d-grid">

<button
class="btn btn-success">

Register

</button>

</div>

</form>

<hr>

<p class="text-center">

Already Registered?

<a href="/login">

Login Here

</a>

</p>

</div>

</div>

</div>

</div>

</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
